<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Mesa</title>
    <link rel="stylesheet" href="formulario.css">

    <style>
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        hr {
            margin: 30px 0;
            border: none;
            height: 1px;
            background: rgba(0, 0, 0, 0.2);
        }

        input,
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-enviar {
            background: #ff0000;
            color: white;
        }

        .btn-voltar {
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="cardapio.html">Cardápio</a></li>
            <li><a href="Sobre.html">Sobre</a></li>
        </ul>
    </nav>

    <div class="card">

        <h2>Reserva Agora</h2>

        <!-- FORM RESERVA -->
        <form action="reservas.php" method="POST" id="formReserva">

            <input type="text" name="nome" placeholder="Nome Completo" required>

            <input type="email" name="email" placeholder="E-mail" required>

            <input type="tel" name="telefone" placeholder="Telefone" required>

            <input type="date" name="data_reserva" required>

            <input type="time" name="hora_reserva" min="08:00" max="22:00" required>

            <input type="number" name="num_pessoa" placeholder="Nº Pessoas (1-10)" min="1" max="10" required>

            <select name="mesa" required>
                <option value="">Selecionar Mesa</option>
                <option value="1">Mesa 1</option>
                <option value="2">Mesa 2</option>
                <option value="3">Mesa 3</option>
                <option value="4">Mesa 4</option>
                <option value="5">Mesa 5</option>
            </select>

            <!-- TOKEN REAL (SERÁ GERADO NO PHP) -->
            <!--<input type="hidden" name="token" id="token"> -->

            <div class="buttons">
                <button type="button" class="btn-voltar" onclick="window.location.href='index.html'">
                    Voltar
                </button>

                <button type="submit" class="btn-enviar">
                    Reservar
                </button>
            </div>

        </form>

        <hr>

        <!-- VER RESERVA -->
        <h2>Ver Reserva</h2>

        <form action="ver_reserva.php" method="GET">

            <input type="text" name="codigo_reserva" placeholder="Código da reserva" required>

            <div class="buttons">
                <button type="submit" class="btn-enviar">
                    Verificar Reserva
                </button>
            </div>

        </form>
    <script src="formulario.js">
    </script>
    <script src="gerente.js"></script>
</body>

</html>
